name: Deploy to Azure with azd

on:
    workflow_dispatch:
    push:
      branches:
        - main

# GitHub Actions workflow to deploy to Azure using azd
# To configure required secrets for connecting to Azure, simply run `azd pipeline config`

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
    id-token: write
    contents: read

jobs:
    build:
      runs-on: ubuntu-latest
      env:
        AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
        AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
        AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
        AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || secrets.AZURE_ENV_NAME }}
        AZURE_LOCATION: ${{ vars.AZURE_LOCATION || secrets.AZURE_LOCATION }}
      steps:
        - name: Checkout
          uses: actions/checkout@v7

        - name: Install azd
          shell: bash
          run: |
            curl -fsSL https://aka.ms/install-azd.sh | bash
            command -v azd
            azd version

        - name: Validate required workflow configuration
          shell: bash
          run: |
            set -euo pipefail

            if [[ -z "${AZURE_ENV_NAME:-}" ]]; then
              echo "Missing AZURE_ENV_NAME. Set repository variable or secret AZURE_ENV_NAME."
              exit 1
            fi

            if [[ -z "${AZURE_LOCATION:-}" ]]; then
              echo "Missing AZURE_LOCATION. Set repository variable or secret AZURE_LOCATION."
              exit 1
            fi

            has_oidc="false"
            if [[ -n "${AZURE_CLIENT_ID:-}" && -n "${AZURE_TENANT_ID:-}" && -n "${AZURE_SUBSCRIPTION_ID:-}" ]]; then
              has_oidc="true"
            fi

            has_sp_secret="false"
            if [[ -n "${AZURE_CREDENTIALS:-}" ]]; then
              has_sp_secret="true"
            fi

            if [[ "$has_oidc" != "true" && "$has_sp_secret" != "true" ]]; then
              echo "No Azure auth configured. Provide either:"
              echo "1) AZURE_CLIENT_ID + AZURE_TENANT_ID + AZURE_SUBSCRIPTION_ID (vars or secrets), or"
              echo "2) secret AZURE_CREDENTIALS"
              exit 1
            fi

        - name: Log in with Azure (Federated Credentials)
          if: ${{ env.AZURE_CLIENT_ID != '' }}
          run: |
            azd auth login `
              --client-id "$Env:AZURE_CLIENT_ID" `
              --federated-credential-provider "github" `
              --tenant-id "$Env:AZURE_TENANT_ID"
          shell: pwsh

        - name: Log in with Azure (Client Credentials)
          if: ${{ env.AZURE_CREDENTIALS != '' }}
          run: |
            $info = $Env:AZURE_CREDENTIALS | ConvertFrom-Json -AsHashtable;
            Write-Host "::add-mask::$($info.clientSecret)"

            azd auth login `
              --client-id "$($info.clientId)" `
              --client-secret "$($info.clientSecret)" `
              --tenant-id "$($info.tenantId)"
          shell: pwsh
          env:
            AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

        - name: Provision Infrastructure
          run: azd provision --no-prompt
          env:
            AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
            AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
            AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}

        - name: Deploy Application
          run: azd deploy --no-prompt
          env:
            AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
            AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
            AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
